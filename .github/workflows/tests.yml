name: Automatisation des tests
on: push
jobs:
  Compilation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Build
        run: |
          # clean previous build if any
          rm -rf build
          mkdir build
          cd build
          cmake ..
          make -j
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build
          path: build

  Test_Add:
    runs-on: ubuntu-latest
    needs: Compilation
    steps:
      - name: Download build
        uses: actions/download-artifact@v4
        with:
          name: build
          path: build
      - name: Make executable
        run: |
          chmod +x ./build/src/calculator || true
      - name: Run add test
        run: |
          ./build/src/calculator add 10 5

  Test_Sub:
    runs-on: ubuntu-latest
    needs: Compilation
    steps:
      - name: Download build
        uses: actions/download-artifact@v4
        with:
          name: build
          path: build
      - name: Make executable
        run: |
          chmod +x ./build/src/calculator || true
      - name: Run sub test
        run: |
          ./build/src/calculator sub 10 5

  Test_Mul:
    runs-on: ubuntu-latest
    needs: Compilation
    steps:
      - name: Download build
        uses: actions/download-artifact@v4
        with:
          name: build
          path: build
      - name: Make executable
        run: |
          chmod +x ./build/src/calculator || true
      - name: Run mul test
        run: |
          ./build/src/calculator mul 10 5

  Test_Div:
    runs-on: ubuntu-latest
    needs: Compilation
    steps:
      - name: Download build
        uses: actions/download-artifact@v4
        with:
          name: build
          path: build
      - name: Make executable
        run: |
          chmod +x ./build/src/calculator || true
      - name: Run div test
        run: |
          ./build/src/calculator div 10 5

  Test_Carre:
    runs-on: ubuntu-latest
    needs: Compilation
    steps:
      - name: Download build
        uses: actions/download-artifact@v4
        with:
          name: build
          path: build
      - name: Make executable
        run: |
          chmod +x ./build/src/calculator || true
      - name: Test fonction carre
        run: |
          ./build/src/calculator car 5

  Deploy:
    runs-on: ubuntu-latest
    needs: [Test_Add, Test_Sub, Test_Mul, Test_Div, Test_Carre]
    steps:
      - name: Deploy message
        run: |
          echo "Déploiement de la solution"
