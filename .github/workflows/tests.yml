name: Automatisation des tests
on: push
jobs:
  Compilation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Compilation
        run: |
          mkdir -p build
          cd build
          cmake ..
          make
          make test

  Test_Add:
    runs-on: ubuntu-latest
    needs: Compilation
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Test fonction add
        run: |
          mkdir -p build
          cd build
          cmake ..
          make
          ./src/calculator add 10 5
